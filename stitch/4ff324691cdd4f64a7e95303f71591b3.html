        body { font-family: 'Inter', sans-serif; }

<body class="bg-surface text-on-surface selection:bg-primary/30">
<!-- Suppressed Shell: Focus on Error Context -->
<main class="min-h-screen flex items-center justify-center p-6 bg-surface">
<!-- Error Canvas: Glassmorphic Elevated Container -->
<div class="relative w-full max-w-2xl bg-surface-variant/70 backdrop-blur-xl rounded-xl p-12 text-center shadow-2xl overflow-hidden">
<!-- Background Aesthetic Element -->
<div class="absolute -top-24 -left-24 w-64 h-64 bg-on-tertiary-container/10 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -right-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
<!-- Error Icon Block -->
<div class="relative z-10 flex flex-col items-center">
<div class="w-24 h-24 mb-8 flex items-center justify-center rounded-full bg-surface-container-highest/50">
<span class="material-symbols-outlined text-6xl text-on-tertiary-container" data-icon="cloud_off">cloud_off</span>
</div>
<!-- Editorial Error Messaging -->
<div class="mb-10 space-y-4">
<span class="inline-block px-4 py-1 rounded-full bg-on-tertiary-container/10 text-on-tertiary-container text-[0.75rem] font-bold tracking-widest uppercase">
                        SİSTEM HATASI 503
                    </span>
<h1 class="text-[3.5rem] font-black leading-tight tracking-tighter text-on-surface">
                        Bir şeyler <span class="text-on-tertiary-container">yanlış</span> gitti.
                    </h1>
<p class="text-on-secondary-container text-lg leading-relaxed max-w-md mx-auto">
                        Digital Atelier sunucularına şu anda ulaşılamıyor. Düşünceleriniz güvende, ancak bağlantıyı tazelememiz gerekiyor.
                    </p>
</div>
<!-- Action Group -->
<div class="flex flex-col sm:flex-row gap-4 items-center justify-center">
<button class="px-8 py-4 bg-primary text-on-primary rounded-xl font-bold text-lg flex items-center gap-3 transition-all hover:scale-[1.02] active:scale-95 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined" data-icon="refresh">refresh</span>
                        Tekrar Dene
                    </button>
<button class="px-8 py-4 text-on-secondary-container font-medium text-lg hover:text-on-surface transition-colors flex items-center gap-2">
<span class="material-symbols-outlined" data-icon="support_agent">support_agent</span>
                        Destek Al
                    </button>
</div>
</div>
<!-- Contextual Footer -->
<div class="mt-16 pt-8 border-t border-outline-variant/15">
<p class="text-[0.75rem] text-outline tracking-widest uppercase mb-4">SON DURUM RAPORU</p>
<div class="flex flex-wrap justify-center gap-4">
<div class="px-4 py-2 bg-surface-container-lowest rounded-lg flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-on-tertiary-container"></div>
<span class="text-sm font-medium text-on-surface-variant">API Bağlantısı: Kesildi</span>
</div>
<div class="px-4 py-2 bg-surface-container-lowest rounded-lg flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-emerald-500"></div>
<span class="text-sm font-medium text-on-surface-variant">Yerel Kayıt: Aktif</span>
</div>
</div>
</div>
</div>
<!-- Decorative Illustration Element -->
<div class="fixed bottom-0 left-0 right-0 h-1/4 pointer-events-none opacity-20">
<div class="w-full h-full bg-gradient-to-t from-surface-container-low to-transparent"></div>
<img class="absolute bottom-0 right-0 w-1/3 max-w-md grayscale mix-blend-lighten" data-alt="abstract architectural sketch of a desk with an empty ink bottle and scattered papers in dark moody lighting with deep shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDaYiepXxzSHEiGp-Yg4EwYk7VsEMXb-G5InGnvnXw_RAFwqUBsuG_7y6QY55RsX20F5hZObWxcYaupCxOnyTvZxz5g9-fV5EWGf50L0hun7RsGVLDLAQ57jj3kT-NAsm-P7MFKSKxRlpLXl75oZqsax8LWd5rzPgK1NuGIfPAO8XpL-fVvvMinU9KMrS-sqyAigQvVfeZQVRQa9BzenFImP6EYaxHUThYOn_DmZxNsseeVnvrgJiZMCQEzZGzLJwb1flhTC3kKlzA"/>
</div>
</main>
<!-- Static Navigation Elements (Disabled/Ghosted State) -->
<div class="fixed top-8 left-8 z-50">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-primary/10 rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="auto_awesome">auto_awesome</span>
</div>
