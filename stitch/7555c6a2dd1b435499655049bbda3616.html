<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes pulse-subtle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-subtle {
            animation: pulse-subtle 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .skeleton-shimmer {
            background: linear-gradient(
                90deg,
                rgba(46, 52, 71, 0.1) 25%,
                rgba(46, 52, 71, 0.4) 50%,
                rgba(46, 52, 71, 0.1) 75%
            );
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
        @keyframes shimmer {
            from { background-position: 200% 0; }
            to { background-position: -200% 0; }
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body overflow-hidden">
<!-- Sidebar Shell (Predicted SideNavBar from JSON) -->
<aside class="bg-[#151b2d] dark:bg-[#151b2d] h-screen w-64 fixed left-0 top-0 flex flex-col h-full py-8 px-4 z-50">

</div>

</div>

<nav class="flex-1 space-y-2">

</div>

</div>

</div>

<div class="h-3 w-28 bg-surface-container-highest rounded-full"></div>
</div>
</nav>

<div class="text-[#adb4ce] pl-5 flex items-center gap-3 h-10">
<span class="material-symbols-outlined text-xl opacity-20">settings</span>
<div class="h-3 w-16 bg-surface-container-highest rounded-full"></div>
</div>
<div class="text-[#adb4ce] pl-5 flex items-center gap-3 h-10">
<span class="material-symbols-outlined text-xl opacity-20">help</span>
<div class="h-3 w-16 bg-surface-container-highest rounded-full"></div>
</div>
</div>

<!-- Top Navigation Bar (Predicted TopNavBar from JSON) -->
<header class="fixed top-0 right-0 w-[calc(100%-16rem)] h-16 bg-[#0c1324]/70 backdrop-blur-xl border-b border-[#46464c]/15 shadow-sm flex items-center justify-between px-8 z-40">

<div class="h-4 w-24 bg-surface-container-highest rounded-full"></div>

</div>

</div>
<div class="skeleton-shimmer absolute inset-0 pointer-events-none"></div>
</div>
<!-- Small Sidebar Card -->
<div class="col-span-4 h-80 bg-surface-container-low rounded-xl p-8 flex flex-col justify-between">
<div class="space-y-6">

<div class="h-6 w-3/4 bg-surface-container-highest rounded-lg"></div>

<div class="pt-4">

</div>
</div>
<div class="col-span-4 h-64 bg-surface-container rounded-xl p-6 space-y-6 animate-pulse-subtle" style="animation-delay: 200ms">

</div>

<div class="relative w-5 h-5">
<div class="absolute inset-0 border-2 border-primary/20 rounded-full"></div>

</div>
